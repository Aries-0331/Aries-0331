name: Update profile

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update README activity
        run: node scripts/update-profile.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_REPOS: Aries-0331/x-toc,Aries-0331/bookmarkassistant
          BLOG_FEED_URL: https://www.arieszhou.cn/rss.xml
          RELEASE_LIMIT: 6
          POST_LIMIT: 6
          TITLE_MAX_LENGTH: 38

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update profile activity"
          git push
